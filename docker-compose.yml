services:
  app:
    build: .
    container_name: citadel_app
    ports:
      - "8501:8501"  # Streamlit Dashboard UI
      - "8000:8000"  # Prometheus exporter port
    volumes:
      - .:/app       # Mount codebase for quick edits if needed
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: always

  redteam_portal:
    build: .
    container_name: citadel_redteam
    command: streamlit run redteam_portal.py --server.port=8502 --server.address=0.0.0.0
    ports:
      - "8502:8502"  # Red Team Hacking Console Portal
    volumes:
      - .:/app
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: citadel_prometheus
    ports:
      - "9090:9090"  # Prometheus Scraper Query Portal
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - app
    restart: always
